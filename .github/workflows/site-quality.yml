name: Site quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-tools.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install image tooling
        run: python -m pip install -r requirements-tools.txt

      - name: Check Python tools
        run: python -m py_compile tools/generate_image_assets.py tools/generate_seo_pages.py tools/validate_site.py

      - name: Regenerate localized pages
        run: python tools/generate_seo_pages.py

      - name: Verify generated files are current
        run: git diff --exit-code

      - name: Check JavaScript syntax
        run: |
          node --check analytics.js
          node --check script.js
          node --check catalog.js
          node --check work.js

      - name: Validate site structure and media
        run: python tools/validate_site.py
